; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.partitions = huge_app.csv
extra_scripts = erase_before_upload.py
lib_deps = 
    pfeerick/elapsedMillis@^1.0.6
    janelia-arduino/TMC2209@^9.4.1
; Força C++17 para suportar inline variables corretamente
build_unflags = -std=gnu++11
build_flags = 
    -std=gnu++17
    -Wall
    -Wextra
    -Wunused

[env:TesteEncoder]
build_flags = ${env.build_flags} -D PCB2_1
lib_deps = 
    ; Wire.h já vem incluído no framework Arduino, não precisa adicionar
    teemuatlut/TMCStepper@^0.7.3
    pfeerick/elapsedMillis@^1.0.6
    plerup/EspSoftwareSerial@^8.2.0
    janelia-arduino/TMC2209@^9.4.2
    waspinator/AccelStepper@^1.64
    gin66/FastAccelStepper@^0.31.2

; Configuração específica para teste simples do encoder
[env:EncoderSimples]
build_flags = 
    -std=gnu++17
    -Wall
monitor_speed = 115200
lib_deps = 
    ; Apenas o básico necessário para o teste do encoder